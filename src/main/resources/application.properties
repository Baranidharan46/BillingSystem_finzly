spring.application.name=BillingSystem

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

spring.jpa.defer-datasource-initialization=true

# Logging
logging.level.org.example.billingsystem=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{requestId}] %logger{36} - %msg%n

# JWT signing key (Base64, 256-bit). Stable across restarts/instances so
# previously issued tokens stay valid. Override via the JWT_SECRET env var in prod.
jwt.secret=${JWT_SECRET:5367566B59703373367639792B423F4528482B4D6251655468576D5A71347437}